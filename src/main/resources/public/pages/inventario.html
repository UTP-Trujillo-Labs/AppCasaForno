<section class="page page-inventario">
  <header class="inventario-header">
    <h2>Inventario y mermas</h2>
    <p>Reporte de pedidos completados e insumos del catálogo.</p>
  </header>

  <div class="inventario-panel reporte-panel">
    <div class="reporte-header">
      <h3>Reporte de pedidos</h3>
      <p class="reporte-resumen">
        Total histórico: <strong id="reporte-total">S/. 0.00</strong>
        · Pedidos: <strong id="reporte-cantidad">0</strong>
      </p>
    </div>
    <div class="inventario-table-wrap">
      <table class="inventario-table">
        <thead>
          <tr>
            <th>Ticket</th>
            <th>Mesa</th>
            <th>Cliente</th>
            <th>Ítems</th>
            <th>Estado</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="reporte-pedidos">
          <tr>
            <td colspan="6" class="content-loading">Cargando histórico…</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="inventario-panel">
    <h3>Inventario</h3>
    <div class="inventario-table-wrap">
      <table class="inventario-table">
        <thead>
          <tr>
            <th>Insumo</th>
            <th>Categoría</th>
            <th>Precio</th>
          </tr>
        </thead>
        <tbody id="inventario-insumos">
          <tr>
            <td colspan="3" class="content-loading">Cargando inventario…</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
