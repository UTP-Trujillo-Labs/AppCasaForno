<section class="page">
  <header class="page-header">
    <h2>Delivery y despacho</h2>
    <p>Gestión de pedidos para entrega a domicilio.</p>
  </header>

  <div class="page-grid">
    <div class="panel">
      <h3>Nuevo delivery</h3>
      <form id="form-delivery" class="form-inline">
        <label>
          Cliente
          <input type="text" id="delivery-cliente" placeholder="Nombre del cliente" required />
        </label>
        <label>
          Dirección
          <input type="text" id="delivery-direccion" placeholder="Dirección de entrega" required />
        </label>
        <label>
          Pedido
          <input type="text" id="delivery-pedido" placeholder="Detalle del pedido" required />
        </label>
        <button type="submit">Registrar</button>
      </form>
    </div>

    <div class="panel">
      <h3>Pedidos en ruta</h3>
      <ul id="lista-delivery" class="data-list">
        <li class="data-list-empty">No hay deliveries registrados.</li>
      </ul>
    </div>
  </div>
</section>
