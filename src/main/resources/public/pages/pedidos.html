<section class="page">
  <header class="page-header">
    <h2>Toma de pedidos</h2>
    <p>Registra y gestiona los pedidos de los clientes en sala.</p>
  </header>

  <div class="page-grid">
    <div class="panel">
      <h3>Nuevo pedido</h3>
      <form id="form-pedido" class="form-inline">
        <label>
          Mesa
          <select id="pedido-mesa" required>
            <option value="">Seleccionar</option>
            <option value="1">Mesa 1</option>
            <option value="2">Mesa 2</option>
            <option value="3">Mesa 3</option>
            <option value="4">Mesa 4</option>
          </select>
        </label>
        <label>
          Plato
          <input type="text" id="pedido-plato" placeholder="Ej. Pizza margarita" required />
        </label>
        <label>
          Cantidad
          <input type="number" id="pedido-cantidad" min="1" value="1" required />
        </label>
        <button type="submit">Agregar</button>
      </form>
    </div>

    <div class="panel">
      <h3>Pedidos activos</h3>
      <ul id="lista-pedidos" class="data-list">
        <li class="data-list-empty">No hay pedidos registrados.</li>
      </ul>
    </div>
  </div>
</section>
