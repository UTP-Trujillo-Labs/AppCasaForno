<section class="page page-pedidos">
  <div class="pedidos-layout">
    <aside class="catalogo-panel">
      <header class="catalogo-header">
        <h2><span class="catalogo-icon">🍕</span> Catálogo</h2>
      </header>

      <input
        type="search"
        id="catalogo-buscar"
        class="catalogo-buscar"
        placeholder="Buscar:"
      />

      <nav class="catalogo-categorias" id="catalogo-categorias"></nav>

      <div class="catalogo-grid-wrap">
        <div class="catalogo-grid" id="catalogo-grid"></div>
      </div>

      <footer class="catalogo-total">
        Total: <span id="catalogo-total">$ 0.00</span>
      </footer>
    </aside>

    <aside class="pedido-panel">
      <div class="pedido-info">
        <p class="pedido-meta">
          Cliente:
          <input
            type="text"
            id="pedido-cliente"
            class="pedido-meta-input"
            value="Juan"
          />
        </p>
        <p class="pedido-meta">
          Mesa:
          <select id="pedido-mesa" class="pedido-meta-input">
            <option value="">Cargando mesas...</option>
          </select>
        </p>
        <hr class="pedido-divider" />
        <ul id="pedido-items" class="pedido-items">
          <li class="pedido-items-empty">Sin productos en el pedido.</li>
        </ul>
      </div>

      <label class="pedido-nota-label" for="pedido-nota"
        >Nota para cocina</label
      >
      <textarea
        id="pedido-nota"
        class="pedido-nota"
        rows="3"
        placeholder="Ej. sin cebolla, poco picante, etc."
      ></textarea>

      <footer class="pedido-acciones">
        <button type="button" id="btn-enviar-cocina" class="btn-enviar-cocina">
          Enviar a Cocina
        </button>
        <button type="button" id="btn-anular-pedido" class="btn-anular-pedido">
          Anular Pedido
        </button>
      </footer>
    </aside>
  </div>
</section>
